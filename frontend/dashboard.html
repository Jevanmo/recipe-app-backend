<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeApp | Dashboard</title>
    <meta name="description" content="View and manage your recipes.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="dashboard.html" class="logo">RecipeApp</a>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <span id="user-greeting" style="color: var(--text-muted); font-weight: 600;"></span>
            <button class="btn btn-outline" id="logout-btn" style="padding: 8px 16px;">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="dashboard-header">
            <h1>My Recipes</h1>
            <button class="btn" id="add-recipe-btn">
                <span>+ Add Recipe</span>
            </button>
        </div>

        <div id="loading" style="text-align: center; padding: 3rem;">
            <div class="loader" style="width: 40px; height: 40px; border-width: 4px;"></div>
            <p style="margin-top: 1rem; color: var(--text-muted);">Loading recipes...</p>
        </div>

        <div class="error-msg" id="dashboard-error"></div>

        <div class="recipe-grid" id="recipe-list" style="display: none;">
            <!-- Recipe cards will be injected here -->
        </div>
        
        <div id="no-recipes" style="display: none; text-align: center; padding: 4rem; background: var(--glass-bg); border-radius: 24px; border: 1px dashed var(--glass-border);">
            <h2 style="margin-bottom: 1rem; color: var(--text-muted);">No recipes found</h2>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">You haven't added any recipes yet. Get started by adding your first one!</p>
            <button class="btn" id="add-first-recipe-btn">Add Your First Recipe</button>
        </div>
    </div>

    <!-- Add Recipe Modal -->
    <div class="modal" id="recipe-modal">
        <div class="glass-panel modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <h2 style="margin-bottom: 1.5rem;">Add New Recipe</h2>
            
            <div class="error-msg" id="modal-error"></div>

            <form id="recipe-form">
                <div class="form-group">
                    <label for="recipe-title-input">Title</label>
                    <input type="text" id="recipe-title-input" class="glass-input" required placeholder="E.g., Spicy Chicken Tikka">
                </div>
                
                <div class="form-group">
                    <label for="recipe-time">Time (minutes)</label>
                    <input type="number" id="recipe-time" class="glass-input" required min="1" placeholder="30">
                </div>

                <div class="form-group">
                    <label for="recipe-price">Price ($)</label>
                    <input type="number" id="recipe-price" class="glass-input" required min="0" step="0.01" placeholder="15.50">
                </div>

                <div class="form-group">
                    <label for="recipe-link">Reference Link (Optional)</label>
                    <input type="url" id="recipe-link" class="glass-input" placeholder="https://example.com/recipe">
                </div>

                <div class="form-group">
                    <label for="recipe-desc">Description</label>
                    <textarea id="recipe-desc" class="glass-input" rows="4" placeholder="Briefly describe the recipe..." style="resize: vertical;"></textarea>
                </div>

                <button type="submit" class="btn" id="save-recipe-btn" style="width: 100%;">Save Recipe</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
